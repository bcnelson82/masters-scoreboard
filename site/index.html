<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NelSouth Masters Showdown</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="container">
    <h1>Annual NelSouth Masters Showdown</h1>

    <div class="teams">
      <div class="team" id="team1">
        <div class="team-header">
          <h2>Dave's Duffers</h2>
          <span class="badge" id="badge1"></span>
        </div>
        <div class="score" id="score1">--</div>
        <div class="trash-talk" id="trash1"></div>
        <div class="players" id="players1"></div>
      </div>

      <div class="team" id="team2">
        <div class="team-header">
          <h2>Brian's Ballers</h2>
          <span class="badge" id="badge2"></span>
        </div>
        <div class="score" id="score2">--</div>
        <div class="trash-talk" id="trash2"></div>
        <div class="players" id="players2"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
