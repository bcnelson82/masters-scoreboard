name: Deploy Scoreboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scoreboard_update]
  schedule:
  - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 playwright

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run updater
        run: python scripts/update_scores.py --url "https://www.espn.com/golf/leaderboard/_/tournamentId/401811941"

      - name: List generated site files
        run: |
          echo "=== site tree ==="
          find site -maxdepth 3 -type f | sort || true
          echo "=== data files preview ==="
          for f in site/data/latest.json site/data/raw_text_debug.txt site/data/raw_lines_debug.txt site/data/section_debug.txt; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              head -n 80 "$f" || true
            fi
          done

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
